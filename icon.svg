<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1f1f2a"/>
      <stop offset="1" stop-color="#12121a"/>
    </linearGradient>
  </defs>
  <rect x="28" y="28" width="344" height="344" rx="76" fill="url(#tile)" stroke="#2a2a36" stroke-width="2"/>
  <!-- magnifier handle (stout, clearly a handle) -->
  <path d="M233,228 L304,299" fill="none" stroke="#ffb02e" stroke-width="28" stroke-linecap="round"/>
  <!-- lens -->
  <circle cx="184" cy="180" r="70" fill="#14141d" stroke="#ffb02e" stroke-width="20"/>
  <!-- node connection magnified inside the lens: two ports + a wire -->
  <path d="M156,166 C180,166 190,196 214,196" fill="none" stroke="#ffb02e" stroke-width="10" stroke-linecap="round"/>
  <circle cx="156" cy="166" r="13" fill="#ffb02e"/>
  <circle cx="214" cy="196" r="13" fill="#ffb02e"/>
</svg>
