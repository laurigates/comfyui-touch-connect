repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.12
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/biomejs/pre-commit
    rev: v2.5.5
    hooks:
      - id: biome-check
        # Must match biome.json's schema (2.x) and what `just lint` / CI run
        # (npx @biomejs/biome + setup-biome@v2, both 2.x). 1.x rejects the
        # `assist`/`includes` keys this config uses. Keep these in lockstep.
        additional_dependencies: ["@biomejs/biome@2.4.15"]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-json
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-added-large-files

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.3
    hooks:
      - id: gitleaks
